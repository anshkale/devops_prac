apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: devops-prac-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
  - host: devops-prac.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: devops-prac-service
            port:
              number: 80